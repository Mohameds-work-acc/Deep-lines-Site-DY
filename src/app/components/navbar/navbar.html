<header>
    <nav class="relative flex justify-between items-center bg-[#0B1013]">
        <a class="text-3xl font-bold leading-none bg-white py-3 px-6 pr-14" style="clip-path: polygon(0 0, 80% 0, 100% 100%, 0% 100%);" routerLink="home">
            <img src="deepLines-logo.png" alt="Deep Lines Logo" class="h-10 sm:h-14">
        </a>
        
        <!-- Burger Button - Updated to use Angular click event -->
        <div class="lg:hidden">
            <button (click)="toggleMenu()" class="flex items-center p-3">
                <svg class="block h-5 w-5 fill-current text-[#CA0018]" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <title>Mobile menu</title>
                    <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"></path>
                </svg>
            </button>
        </div>
        
        <!-- Desktop Menu -->
        <ul class="hidden absolute top-1/2 left-1/4 transform -translate-y-1/2 lg:flex lg:mx-auto lg:flex lg:items-center lg:w-max lg:space-x-6">
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="home">Home</a></li>
            <li class="text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#CA0018" class="w-4 h-4 current-fill" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v0m0 7v0m0 7v0m0-13a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </li>
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="about-us">About Us</a></li>
            <li class="text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#CA0018" class="w-4 h-4 current-fill" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v0m0 7v0m0 7v0m0-13a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </li>
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="services">Services</a></li>
            <li class="text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#CA0018" class="w-4 h-4 current-fill" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v0m0 7v0m0 7v0m0-13a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </li>
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="solutions">Solutions</a></li>
            <li class="text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#CA0018" class="w-4 h-4 current-fill" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v0m0 7v0m0 7v0m0-13a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </li>
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="projects">Projects</a></li>
            <li class="text-gray-300">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#CA0018" class="w-4 h-4 current-fill" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v0m0 7v0m0 7v0m0-13a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </li>
            <li class="desktop-view-li"><a class="text-sm text-white" routerLink="blogs">Blogs</a></li>

            <div class="desktop-view-li flex items-center space-x-4 ml-10">
                <a routerLink="become-supplier" class="text-xs py-2 px-4 border border-[#CA0018] text-[#CA0018] hover:bg-[#CA0018] hover:text-white">
                    Become a Supplier
                </a>
                <p class="h-6 w-0.5 bg-white"></p>
                <a routerLink="contact" class="text-xs py-2 px-4 bg-[#CA0018] text-white">
                    Contact Us
                </a>
            </div>
        </ul>
    </nav>
    
    <!-- Mobile Navigation Menu - Using isOpen from component -->
    <div class="mobile-menu relative z-50" [class.active]="isOpen">
        <!-- Backdrop Overlay -->
        <div class="mobile-backdrop fixed inset-0 bg-black/60 backdrop-blur-sm transition-all duration-300" 
             [class.opacity-0]="!isOpen" 
             [class.invisible]="!isOpen"
             (click)="closeMenu()"></div>
        
        <!-- Menu Panel -->
        <nav class="fixed top-0 left-0 bottom-0 flex flex-col w-4/5 max-w-sm bg-gradient-to-b from-[#0B1120] to-[#0F172A] shadow-2xl transform transition-transform duration-500 ease-out overflow-y-auto"
             [class.-translate-x-full]="!isOpen"
             [class.translate-x-0]="isOpen">
            
            <!-- Header -->
            <div class="relative px-6 py-8 border-b border-gray-800/60">
                <div class="flex items-center justify-between">
                    <a routerLink="/" (click)="closeMenu()" class="block">
                        <img src="deepLines-logo-3.png" alt="Deep Lines" class="h-12 w-auto">
                    </a>
                    <button (click)="closeMenu()" 
                            class="w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 transition-all flex items-center justify-center group">
                        <svg class="w-5 h-5 text-gray-400 group-hover:text-[#CA0018] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <p class="text-gray-500 text-xs mt-4">Navigate through our services</p>
            </div>
            
            <!-- Navigation Links -->
            <div class="flex-1 px-4 py-6">
                <ul class="space-y-1">
                    <li *ngFor="let item of navItems">
                        <a [routerLink]="item.path" 
                           (click)="closeMenu()"
                           class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-300 hover:text-white hover:bg-white/5 transition-all duration-300 group"
                           [class.active]="isActive(item.path)">
                            <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-[#CA0018]/20 transition-all">
                                <i [class]="item.icon + ' text-sm'"></i>
                            </div>
                            <span class="font-medium text-sm">{{item.label}}</span>
                            <svg class="w-4 h-4 ml-auto opacity-0 group-hover:opacity-100 transition-all transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    </li>
                </ul>
                
                <!-- Divider -->
                <div class="my-6 h-px bg-gradient-to-r from-transparent via-gray-800 to-transparent"></div>
                
                <!-- Action Buttons -->
                <div class="space-y-3">
                    <a routerLink="/become-supplier" 
                       (click)="closeMenu()"
                       class="flex items-center justify-between gap-3 w-full px-4 py-3 rounded-xl bg-[#CA0018]/10 border border-[#CA0018]/20 text-[#CA0018] hover:bg-[#CA0018] hover:text-white transition-all duration-300 group">
                        <span class="font-semibold text-sm">Become a Supplier</span>
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                        </svg>
                    </a>
                    
                    <a routerLink="/contact" 
                       (click)="closeMenu()"
                       class="flex items-center justify-between gap-3 w-full px-4 py-3 rounded-xl bg-white/5 border border-gray-800 text-gray-300 hover:bg-white/10 hover:text-white transition-all duration-300 group">
                        <span class="font-semibold text-sm">Contact Us</span>
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </a>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="px-6 py-6 border-t border-gray-800/60">
                <div class="flex justify-center gap-4 mb-4">
                    <a href="#" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-[#CA0018] transition-all">
                        <i class="fa-brands fa-linkedin-in text-xs text-gray-400 hover:text-white"></i>
                    </a>
                    <a href="#" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-[#CA0018] transition-all">
                        <i class="fa-brands fa-twitter text-xs text-gray-400 hover:text-white"></i>
                    </a>
                    <a href="#" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-[#CA0018] transition-all">
                        <i class="fa-brands fa-facebook-f text-xs text-gray-400 hover:text-white"></i>
                    </a>
                    <a href="#" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-[#CA0018] transition-all">
                        <i class="fa-brands fa-instagram text-xs text-gray-400 hover:text-white"></i>
                    </a>
                </div>
                <p class="text-center text-xs text-gray-600">
                    © {{currentYear}} Deep Lines. All rights reserved.
                </p>
            </div>
        </nav>
    </div>
</header>
